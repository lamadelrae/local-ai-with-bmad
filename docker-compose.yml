services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: local-gemma-chat-model
    ports:
      - "8080:8080"
    environment:
      - LLAMA_CACHE=/cache
    volumes:
      - llama-cache:/cache
    command:
      - "-hf"
      - "ggml-org/gemma-4-E2B-it-GGUF"
      - "--port"
      - "8080"
      - "--host"
      - "0.0.0.0"
      - "-c"
      - "8192"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    restart: unless-stopped

volumes:
  llama-cache:
